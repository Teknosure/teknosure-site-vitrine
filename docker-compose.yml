services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teknosure-app
    restart: always
    environment:
      - NODE_ENV=production
    env_file:
      - .env.local
    networks:
      - teknosure-network

  nginx:
    image: nginx:alpine
    container_name: teknosure-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - teknosure-network

networks:
  teknosure-network:
    driver: bridge
