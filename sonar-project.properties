# Configuration SonarQube pour Teknosure Website
sonar.projectKey=teknosure-website
sonar.projectName=Teknosure Website
sonar.projectVersion=1.0

# Chemin des sources
sonar.sources=app,public
sonar.exclusions=**/node_modules/**,**/*.test.ts,**/*.test.tsx,**/.next/**,**/dist/**,**/build/**,**/coverage/**

# Extensions TypeScript/JavaScript
sonar.typescript.file.suffixes=.ts,.tsx
sonar.javascript.file.suffixes=.js,.jsx

# Encodage
sonar.sourceEncoding=UTF-8

# Coverage (si vous ajoutez des tests)
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Chemins de tests (quand vous en aurez)
# sonar.tests=__tests__,**/*.test.ts,**/*.test.tsx

# Niveau de log
sonar.log.level=INFO

# Ignorer les fichiers générés
sonar.coverage.exclusions=**/*.config.*,**/globals.css,**/.next/**
